<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<script src="https://unpkg.com/@owlbear-rodeo/sdk@latest/dist/index.umd.js"></script>
<style>
body { font-family: sans-serif; padding: 10px; }
button { width: 100%; margin: 5px 0; padding: 6px; }
.token { padding: 6px; border-bottom: 1px solid #ccc; }
.active { background: #ffe082; font-weight: bold; }
</style>
</head>
<body>

<h2>Card Initiative</h2>

<button id="deal">🎴 Раздать карты</button>
<button id="next">➡ Следующий ход</button>
<button id="clear">🗑 Удалить всех</button>
<button id="addToken">➕ Добавить выбранный токен</button>

<h3>Инициатива:</h3>
<div id="initiative"></div>

<script>
const OBR = window.OBR;
const STORAGE_KEY = "card-initiative-data";

let state = {
  initiative: [],
  currentTurn: 0
};

let isGM = false;

// ---------- Колода ----------
function createDeck() {
  const suits = ["♠", "♥", "♦", "♣"];
  const values = [
    {n:"2",r:2},{n:"3",r:3},{n:"4",r:4},{n:"5",r:5},
    {n:"6",r:6},{n:"7",r:7},{n:"8",r:8},{n:"9",r:9},
    {n:"10",r:10},{n:"J",r:11},{n:"Q",r:12},
    {n:"K",r:13},{n:"A",r:14}
  ];

  let deck = [];

  suits.forEach((suit, suitIndex) => {
    values.forEach(v => {
      deck.push({
        label: `${v.n} ${suit}`,
        rank: v.r,
        suitRank: 4 - suitIndex
      });
    });
  });

  deck.push({ label:"Joker 🃏", rank:15, suitRank:2 });
  deck.push({ label:"Joker 🃏", rank:15, suitRank:1 });

  return deck;
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function sortInitiative() {
  state.initiative.sort((a,b)=>{
    if (b.card.rank === a.card.rank)
      return b.card.suitRank - a.card.suitRank;
    return b.card.rank - a.card.rank;
  });
}

// ---------- Сохранение ----------
async function saveState() {
  await OBR.room.setMetadata({ [STORAGE_KEY]: state });
}

async function loadState() {
  const metadata = await OBR.room.getMetadata();
  if (metadata[STORAGE_KEY]) {
    state = metadata[STORAGE_KEY];
  }
}

// ---------- UI ----------
function render() {
  const div = document.getElementById("initiative");
  div.innerHTML = "";

  state.initiative.forEach((entry, index) => {
    const el = document.createElement("div");
    el.className = "token";

    if (index === state.currentTurn) {
      el.classList.add("active");
    }

    let cardText = "🂠";

    if (isGM && entry.card) {
      cardText = entry.card.label;
    }

    el.textContent = `${entry.name} — ${cardText}`;
    div.appendChild(el);
  });
}

// ---------- Добавить токен ----------
document.getElementById("addToken").onclick = async () => {
  const selected = await OBR.player.getSelection();
  if (!selected.length) return;

  const items = await OBR.scene.items.getItems(selected);

  items.forEach(item => {
    if (!state.initiative.find(e=>e.id===item.id)) {
      state.initiative.push({
        id: item.id,
        name: item.name || "Token",
        card: null
      });
    }
  });

  await saveState();
};

// ---------- Раздать карты ----------
document.getElementById("deal").onclick = async () => {
  if (!isGM) return alert("Только GM может раздавать!");

  let deck = createDeck();
  shuffle(deck);

  state.initiative.forEach((entry, i)=>{
    entry.card = deck[i];
  });

  sortInitiative();
  state.currentTurn = 0;

  await saveState();
};

// ---------- Следующий ход ----------
document.getElementById("next").onclick = async () => {
  if (!state.initiative.length) return;

  state.currentTurn++;
  if (state.currentTurn >= state.initiative.length)
    state.currentTurn = 0;

  await saveState();
};

// ---------- Очистить ----------
document.getElementById("clear").onclick = async () => {
  if (!isGM) return alert("Только GM может удалять!");

  state = { initiative: [], currentTurn: 0 };
  await saveState();
};

// ---------- INIT ----------
OBR.onReady(async () => {

  const role = await OBR.player.getRole();
  isGM = role === "GM";

  await loadState();
  render();

  OBR.room.onMetadataChange((metadata)=>{
    if (metadata[STORAGE_KEY]) {
      state = metadata[STORAGE_KEY];
      render();
    }
  });
});
</script>

</body>
</html>
